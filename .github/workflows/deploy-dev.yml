name: Deploy — Development

on:
  push:
    branches: [development]
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC authentication to Azure
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'
  FUNCTIONS_PROJECT: src/TripsTracker.Functions/TripsTracker.Functions.csproj
  TESTS_PROJECT: tests/TripsTracker.Tests/TripsTracker.Tests.csproj
  BICEP_FILE: infra/main.bicep
  BICEP_PARAMS: infra/dev.bicepparam

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (unit + SQLite)
        run: dotnet test ${{ env.TESTS_PROJECT }} --no-build --configuration Release --filter "TestCategory!=RealDatabase" --logger trx

      - name: Publish Functions artifact
        run: dotnet publish ${{ env.FUNCTIONS_PROJECT }} --no-build --configuration Release --output ./publish/functions

      - uses: actions/upload-artifact@v4
        with:
          name: functions-artifact
          path: ./publish/functions

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/TripsTracker.Web/package-lock.json

      - name: Install
        working-directory: src/TripsTracker.Web
        run: npm ci

      - name: Build
        working-directory: src/TripsTracker.Web
        run: npm run build
        env:
          VITE_API_BASE_URL: 'https://func-tripstracker-dev-${{ secrets.UNIQUE_SUFFIX }}.azurewebsites.net'

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: src/TripsTracker.Web/dist

  deploy:
    name: Deploy to Azure (dev)
    runs-on: ubuntu-latest
    needs: [build-and-test, build-frontend]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: ${{ env.BICEP_FILE }}
          parameters: ${{ env.BICEP_PARAMS }} uniqueSuffix=${{ secrets.UNIQUE_SUFFIX }} sqlEntraAdminObjectId=${{ secrets.SQL_ENTRA_ADMIN_OBJECT_ID }} sqlEntraAdminDisplayName=${{ secrets.SQL_ENTRA_ADMIN_DISPLAY_NAME }} nominatimUserAgent=${{ secrets.NOMINATIM_USER_AGENT }}
          failOnStdErr: false

      - name: Download Functions artifact
        uses: actions/download-artifact@v4
        with:
          name: functions-artifact
          path: ./publish/functions

      - name: Deploy Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: func-tripstracker-dev-${{ secrets.UNIQUE_SUFFIX }}
          package: ./publish/functions

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact
          path: ./dist

      - name: Deploy Static Web App
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: ./dist
          skip_app_build: true
