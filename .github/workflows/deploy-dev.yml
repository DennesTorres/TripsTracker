name: Deploy — Development

on:
  push:
    branches: [development]

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.x'
  NODE_VERSION: '22.x'
  FUNCTIONS_PROJECT: src/TripsTracker.Functions/TripsTracker.Functions.csproj
  PUBLISH_DIR: ./publish/functions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      # ── Azure Login (OIDC) ──────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Backend: Build & Deploy Azure Functions ──────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Functions
        run: dotnet publish ${{ env.FUNCTIONS_PROJECT }} -c Release -o ${{ env.PUBLISH_DIR }}

      - name: Deploy Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: ${{ env.PUBLISH_DIR }}

      # ── Frontend: Build & Deploy Static Web App ──────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/TripsTracker.Web/package-lock.json

      - name: Install & Build Frontend
        working-directory: src/TripsTracker.Web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy Static Web App
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: src/TripsTracker.Web
          output_location: dist
          skip_app_build: true
