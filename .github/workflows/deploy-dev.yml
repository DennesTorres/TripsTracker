name: Deploy — DEV

on:
  push:
    branches: [development]
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_RG: rg-tripstracker-dev
  AZURE_LOCATION: uksouth
  ENV: dev
  UNIQUE_SUFFIX: ttk
  SQL_SERVER: sql-tripstracker-dev-ttk.database.windows.net
  SQL_DATABASE: TripsTracker
  FUNCTION_APP_NAME: func-tripstracker-dev-ttk
  FUNCTION_APP_URL: https://func-tripstracker-dev-ttk.azurewebsites.net/api

jobs:
  deploy:
    name: Provision + Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Infra ────────────────────────────────────────────────────────────────

      - name: Create resource group (idempotent)
        run: |
          az group create             --name $AZURE_RG             --location $AZURE_LOCATION             --tags environment=dev project=tripstracker

      - name: Deploy Bicep (incremental — idempotent)
        id: bicep
        run: |
          output=$(az deployment group create             --resource-group $AZURE_RG             --template-file infra/main.bicep             --parameters infra/dev.parameters.json             --mode Incremental             --query properties.outputs             --output json)
          swa_token=$(echo "$output" | jq -r '.staticWebAppDeploymentToken.value')
          echo "swa_token=$swa_token" >> $GITHUB_OUTPUT

      # ── Database: access grants + migrations ─────────────────────────────────

      - name: Install go-sqlcmd
        run: |
          curl -sSfL https://github.com/microsoft/go-sqlcmd/releases/download/v1.8.0/sqlcmd-linux-amd64.tar.bz2             | sudo tar -C /usr/local/bin -xj
          sqlcmd version

      - name: Setup SQL access (idempotent)
        run: |
          sqlcmd             -S $SQL_SERVER             -d $SQL_DATABASE             --authentication-method ActiveDirectoryDefault             -v FunctionAppName="$FUNCTION_APP_NAME"             -i infra/sql/setup.sql

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run EF Core migrations
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update             --project src/TripsTracker.Data/TripsTracker.Data.csproj             --connection "Server=$SQL_SERVER;Database=$SQL_DATABASE;Authentication=Active Directory Service Principal;User ID=${{ secrets.AZURE_CLIENT_ID }};Password=${{ secrets.AZURE_CLIENT_SECRET }};Encrypt=True;TrustServerCertificate=False;"

      # ── Backend — Azure Functions ─────────────────────────────────────────────

      - name: Publish Functions
        run: |
          dotnet publish src/TripsTracker.Functions/TripsTracker.Functions.csproj             --configuration Release             --output ./publish/functions

      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ./publish/functions

      # ── Frontend — Static Web App ─────────────────────────────────────────────

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/TripsTracker.Web/package-lock.json

      - name: Build frontend
        working-directory: src/TripsTracker.Web
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ env.FUNCTION_APP_URL }}

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.bicep.outputs.swa_token }}
          action: upload
          app_location: src/TripsTracker.Web/dist
          skip_app_build: true
