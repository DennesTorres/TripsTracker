name: Deploy — DEV

on:
  push:
    branches: [development]
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_RG: rg-tripstracker-dev
  AZURE_LOCATION: uksouth
  ENV: dev
  UNIQUE_SUFFIX: ttk
  SQL_SERVER: sql-tripstracker-dev-ttk.database.windows.net
  SQL_SERVER_NAME: sql-tripstracker-dev-ttk
  SQL_DATABASE: TripsTracker
  FUNCTION_APP_NAME: func-tripstracker-dev-ttk
  FUNCTION_APP_URL: https://func-tripstracker-dev-ttk.azurewebsites.net/api

jobs:
  deploy:
    name: Provision + Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Infra ────────────────────────────────────────────────────────────────

      - name: Create resource group (idempotent)
        run: |
          az group create \
            --name $AZURE_RG \
            --location $AZURE_LOCATION \
            --tags environment=dev project=tripstracker

      - name: Deploy Bicep (incremental — idempotent)
        id: bicep
        run: |
          output=$(az deployment group create \
            --resource-group $AZURE_RG \
            --template-file infra/main.bicep \
            --parameters infra/dev.parameters.json \
            --mode Incremental \
            --query properties.outputs \
            --output json)
          swa_token=$(echo "$output" | jq -r '.staticWebAppDeploymentToken.value')
          echo "swa_token=$swa_token" >> $GITHUB_OUTPUT

      # ── Database: firewall + access grants + migrations ───────────────────────

      - name: Open SQL firewall for GitHub runner
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          az sql server firewall-rule create \
            --server $SQL_SERVER_NAME \
            --resource-group $AZURE_RG \
            --name GitHubActionsRunner \
            --start-ip-address $RUNNER_IP \
            --end-ip-address $RUNNER_IP

      - name: Install go-sqlcmd
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --batch --no-tty --dearmor \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -yq sqlcmd
          sqlcmd --version

      - name: Setup SQL access (idempotent)
        run: |
          sqlcmd \
            -S $SQL_SERVER \
            -d $SQL_DATABASE \
            --authentication-method ActiveDirectoryDefault \
            -b \
            -v FunctionAppName="$FUNCTION_APP_NAME" \
            -i infra/sql/setup.sql

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet packages
        run: dotnet restore TripsTracker.slnx

      - name: Run EF Core migrations
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update \
            --project src/TripsTracker.Data/TripsTracker.Data.csproj \
            --startup-project src/TripsTracker.Functions/TripsTracker.Functions.csproj \
            --connection "Server=$SQL_SERVER;Database=$SQL_DATABASE;Authentication=Active Directory Service Principal;User ID=${{ secrets.AZURE_CLIENT_ID }};Password=${{ secrets.AZURE_CLIENT_SECRET }};Encrypt=True;TrustServerCertificate=False;"

      - name: Close SQL firewall
        if: always()
        run: |
          az sql server firewall-rule delete \
            --server $SQL_SERVER_NAME \
            --resource-group $AZURE_RG \
            --name GitHubActionsRunner \
            --yes 2>/dev/null || true

      # ── Backend: compile + deploy ─────────────────────────────────────────────

      - name: Publish Functions
        run: |
          dotnet publish src/TripsTracker.Functions/TripsTracker.Functions.csproj \
            --configuration Release \
            --output ./publish/functions

      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ./publish/functions

      # ── Frontend — Static Web App ─────────────────────────────────────────────

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/TripsTracker.Web/package-lock.json

      - name: Build frontend
        working-directory: src/TripsTracker.Web
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: https://${{ env.FUNCTION_APP_NAME }}.azurewebsites.net
          VITE_AUTH_CLIENT_ID: ${{ secrets.VITE_AUTH_CLIENT_ID }}

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.bicep.outputs.swa_token }}
          action: upload
          app_location: src/TripsTracker.Web/dist
          skip_app_build: true

      # ── Smoke test ───────────────────────────────────────────────────────────

      - name: Smoke test — verify API responds
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FUNCTION_APP_URL/health")
            echo "Smoke test attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            [ "$i" = "3" ] && echo "Smoke test FAILED — deployment did not result in a working API" && exit 1
            sleep 15
          done
